# LLamaFactory/MCA SFT template for Milestone 1 Qwen3-8B coding-agent data.
# Runtime scripts may copy this file into a run directory and override
# model_name_or_path/output_dir/dataset paths before launch.

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full

### dataset
dataset_dir: data/sft
dataset: milestone1_coding_agent_sft
template: qwen3
cutoff_len: 32768
neat_packing: true
neat_packing_pad_to_multiple_of: 2
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /mnt/3fs/data/ai4ai/outputs/coding_agent_playground/training_summary/sft_output/qwen3_8b_milestone1
logging_steps: 1
save_steps: 150
save_total_limit: 4
plot_loss: true
overwrite_output_dir: false
save_only_model: true
save_hf_model: true
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs: '{"min_lr": 2.0e-6}'
warmup_ratio: 0.03
bf16: true
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.98
max_grad_norm: 1.0

### megatron parallelism
tensor_model_parallel_size: 1
pipeline_model_parallel_size: 1
context_parallel_size: 1
sequence_parallel: false
expert_model_parallel_size: 1
use_distributed_optimizer: true
overlap_param_gather: true
overlap_grad_reduce: true
recompute_granularity: full
bias_activation_fusion: true
apply_rope_fusion: true
moe_grouped_gemm: true
moe_token_dispatcher_type: alltoall
