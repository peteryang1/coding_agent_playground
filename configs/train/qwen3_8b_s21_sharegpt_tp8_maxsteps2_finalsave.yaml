# Session 21/22 ShareGPT Qwen3-8B SFT smoke template.
# Use only after PM/resource/test gates authorize a retry.

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full

### dataset
dataset_dir: data/sft
dataset: coding_agent_m1_sft_10_sharegpt
template: qwen3
cutoff_len: 32768
neat_packing: true
neat_packing_pad_to_multiple_of: 2
# Keep the 10-row smoke preprocessing in-process. The post-PR39 runtime failed
# in datasets.map(num_proc=4) / SyncManager EOFError before training.
preprocessing_num_workers: null
dataloader_num_workers: 0

### output
output_dir: /home/xu.yang/coding_agent_playground/outputs/training_summary/sft_output/qwen3_8b_milestone1_s21_sharegpt_tiny_smoke
logging_steps: 1
save_steps: 2
save_total_limit: 1
plot_loss: true
overwrite_output_dir: false
save_only_model: true
save_hf_model: true
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 2.0e-5
max_steps: 2
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs: '{"min_lr": 2.0e-6}'
warmup_steps: 0
bf16: true
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.98
max_grad_norm: 1.0

### megatron parallelism
tensor_model_parallel_size: 8
pipeline_model_parallel_size: 1
context_parallel_size: 1
sequence_parallel: false
expert_model_parallel_size: 1
use_distributed_optimizer: true
overlap_param_gather: true
overlap_grad_reduce: true
recompute_granularity: full
bias_activation_fusion: true
apply_rope_fusion: true
moe_grouped_gemm: true
moe_token_dispatcher_type: alltoall
